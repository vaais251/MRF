services:
  app:
    build:
      context: .
      target: runner
    environment:
      - NODE_ENV=production
      # Inside Docker the database is reached at the service name "db", NOT localhost.
      # Hardcoded (not ${DATABASE_URL}) so a dev .env with localhost can't override it.
      # Credentials match the db service below.
      - DATABASE_URL=postgresql://mrt_user:mrt_pass@db:5432/mrt_db?schema=public
      # IMPORTANT: set a strong NEXTAUTH_SECRET (and your server URL) in a .env file for real deployments.
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-please_change_this_to_a_random_secret}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3000:3000"
    command: sh -c "./scripts/migrate-and-seed.sh && node server.js"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=mrt_user
      - POSTGRES_PASSWORD=mrt_pass
      - POSTGRES_DB=mrt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrt_user -d mrt_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
