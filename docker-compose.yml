services:
  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "apk add --no-cache openssl && npm install && npx prisma generate && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://mrt_user:mrt_pass@db:5432/mrt_db?schema=public
      - NEXTAUTH_SECRET=development_secret_do_not_use_in_prod
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mrt_user
      POSTGRES_PASSWORD: mrt_pass
      POSTGRES_DB: mrt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
